<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | Ultra Intelligent Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0c0d10;
            --bg-card: rgba(23, 25, 31, 0.7);
            --bg-sidebar: #12141a;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-page); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; transition: background 0.4s; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-page); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 900px; height: 620px; background: var(--bg-card); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 40px; display: flex; overflow: hidden; box-shadow: 0 40px 120px rgba(0,0,0,0.5); }
        .auth-left { flex: 1.2; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: rgba(255,255,255,0.02); }
        .auth-right { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; background: var(--bg-card); overflow-y: auto; }
        .auth-logo { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-tabs { display: flex; gap: 24px; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .auth-tab { cursor: pointer; padding-bottom: 12px; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; position: relative; }
        .auth-tab.active { color: var(--text-main); }
        .auth-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--primary); }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px 16px; border-radius: 14px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        
        .primary-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.3s; margin-bottom: 20px; box-shadow: 0 10px 25px var(--primary-glow); }
        .google-login-btn { background: white; color: #1e293b; border: 1px solid #e2e8f0; padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 0.9rem; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px 10px; }
        .nav-item { padding: 12px 16px; margin: 4px 8px; border-radius: 14px; cursor: pointer; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        
        .history-section { border-top: 1px solid var(--border); margin-top: 25px; padding: 25px 5px 0; }
        .history-item { padding: 10px 18px; border-radius: 12px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .history-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .history-item.active { background: rgba(99, 102, 241, 0.08); color: var(--primary); }
        .delete-btn { opacity: 0; padding: 4px; border-radius: 6px; color: #ef4444; font-size: 1rem; transition: 0.2s; }
        .history-item:hover .delete-btn { opacity: 1; }

        /* Chat Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-page); }
        .page-content { display: none; width: 100%; height: 100%; overflow-y: auto; flex-direction: column; align-items: center; padding: 60px 40px; }
        .page-content.active { display: flex; }

        #chat-page { padding: 0; position: relative; }
        .chat-scroller { flex: 1; overflow-y: auto; padding: 40px 5% 150px; width: 100%; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 40px; }
        
        .msg { width: 100%; display: flex; flex-direction: column; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-items: flex-end; }
        .msg.ai { align-items: flex-start; }

        .bubble { max-width: 80%; padding: 18px 24px; border-radius: 24px; font-size: 1.05rem; line-height: 1.7; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .msg.user .bubble { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-bottom-right-radius: 4px; }
        .msg.ai .bubble { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-bottom-left-radius: 4px; backdrop-filter: blur(20px); }
        
        .role { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 850px; background: var(--bg-card); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 28px; padding: 10px 10px 10px 24px; display: flex; align-items: flex-end; gap: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 10; }
        textarea { flex: 1; border: none; background: transparent; color: var(--text-main); outline: none; font-size: 1.1rem; padding: 12px 0; resize: none; max-height: 200px; }
        .s-btn { background: var(--primary); color: white; border: none; width: 48px; height: 48px; border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
    </style>
</head>
<body data-theme="dark">
    <!-- Auth -->
    <div id="auth-screen">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-logo">AI STUDIO</div>
                <h2 style="font-size:2.5rem; font-weight:700; line-height:1.1; margin-bottom:20px;">Think faster. Build better.</h2>
                <p style="color:var(--text-dim); line-height:1.6;">Your professional AI environment is ready. What are we creating today?</p>
            </div>
            <div class="auth-right">
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login" onclick="setAuth('login')">LOGIN</div>
                    <div class="auth-tab" id="tab-signup" onclick="setAuth('signup')">SIGN UP</div>
                </div>
                <div id="auth-form">
                    <div class="input-group" id="name-group" style="display:none;"><label>FULL NAME</label><input type="text" id="u-name-val" placeholder="John Doe"></div>
                    <div class="input-group"><label>EMAIL</label><input type="email" id="u-email-val" placeholder="name@company.com"></div>
                    <div class="input-group"><label>PASSWORD</label><input type="password" id="u-pass-val" placeholder="••••••••"></div>
                    <button class="primary-btn" id="auth-btn" onclick="runAuth()">Login</button>
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px; color:var(--text-dim); font-size:0.75rem;"><div style="flex:1; height:1px; background:var(--border);"></div>OR<div style="flex:1; height:1px; background:var(--border);"></div></div>
                    <button class="google-login-btn" onclick="googleAuth()">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="Google">Sign in with Google
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Layout -->
    <div class="sidebar">
        <div style="padding: 30px 24px; font-family:'Outfit',sans-serif; font-weight:700; font-size:1.4rem;">AI STUDIO</div>
        <div class="sidebar-scroll">
            <div class="nav-item active" onclick="nav('home')">Overview</div>
            <div class="nav-item" onclick="nav('chat')">New Conversation</div>
            <div class="nav-item" onclick="nav('profile')">My Workspace</div>
            <div class="history-section">
                <div id="history-box"></div>
            </div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <div class="nav-item" style="margin:0" onclick="logOff()">Sign out</div>
        </div>
    </div>

    <div class="workspace">
        <div id="home-page" class="page-content active" style="justify-content:center; text-align:center;">
            <h1 id="greet" style="font-size:3.5rem; font-family:'Outfit',sans-serif; margin-bottom:15px;">Welcome back.</h1>
            <p style="color:var(--text-dim); margin-bottom:40px;">Deep thinking is just a conversation away.</p>
            <button class="primary-btn" style="width:240px" onclick="nav('chat')">+ Start Research</button>
        </div>

        <div id="chat-page" class="page-content">
            <div class="chat-scroller" id="scroll-box"><div class="chat-container" id="feed-box"></div></div>
            <div class="bar">
                <textarea id="msg-input" rows="1" placeholder="Type a message..." oninput="autoExpand(this)"></textarea>
                <button class="s-btn" onclick="send()">↑</button>
            </div>
        </div>

        <div id="profile-page" class="page-content" style="justify-content:center;">
             <div style="width:100%; max-width:620px; background:var(--bg-card); border:1px solid var(--border); border-radius:40px; padding:60px; text-align:center;">
                <img id="p-photo" src="" style="width:110px; height:110px; border-radius:35px; margin-bottom:24px; object-fit:cover; border:2px solid var(--primary);">
                <h2 id="p-name">Display Name</h2>
                <p id="p-email" style="color:var(--text-dim); margin-bottom:50px;"></p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="padding:22px; background:rgba(255,255,255,0.03); border-radius:22px;">
                        <span style="font-size:0.75rem; font-weight:700; color:var(--text-dim); letter-spacing:1px;">ACTIVE SESSIONS</span>
                        <div style="font-weight:700; font-size:1.5rem;" id="stat-chats">0</div>
                    </div>
                </div>
             </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDT6NDa5i5Lqh20BMDo7KoMzb-iDiAZrKA", authDomain: "study-gen.firebaseapp.com", projectId: "study-gen", storageBucket: "study-gen.firebasestorage.app", messagingSenderId: "593504096149", appId: "1:593504096149:web:0f917e36b083ed3452709c" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentId = null; let mode = 'login'; let msgs = [];

        window.setAuth = (t) => { mode = t; document.getElementById('name-group').style.display = t==='login'?'none':'block'; document.getElementById('tab-login').classList.toggle('active', t==='login'); document.getElementById('tab-signup').classList.toggle('active', t==='signup'); document.getElementById('auth-btn').innerText = t==='login'?'Login':'Create Account'; };
        window.runAuth = async () => {
            const n = document.getElementById('u-name-val').value;
            const e = document.getElementById('u-email-val').value;
            const p = document.getElementById('u-pass-val').value;
            try { 
                if(mode==='login') await signInWithEmailAndPassword(auth, e, p);
                else { await createUserWithEmailAndPassword(auth, e, p); await updateProfile(auth.currentUser, {displayName: n}); }
            } catch(ex){ alert(ex.message); }
        };
        window.googleAuth = () => signInWithPopup(auth, provider);
        window.logOff = () => signOut(auth).then(()=>location.reload());

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('greet').innerText = `Welcome, ${u.displayName ? u.displayName.split(' ')[0] : 'there'}.`;
                document.getElementById('p-name').innerText = u.displayName || u.email;
                document.getElementById('p-email').innerText = u.email;
                document.getElementById('p-photo').src = u.photoURL || 'https://ui-avatars.com/api/?name='+u.email+'&background=6366f1&color=fff';
                loadSessions();
            } else document.getElementById('auth-screen').style.display='flex';
        });

        window.nav = (p) => {
            document.querySelectorAll('.page-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p+'-page').classList.add('active');
            if(p==='chat' && !currentId) { document.getElementById('feed-box').innerHTML = ''; msgs = []; }
        };

        window.autoExpand = (e) => { e.style.height='auto'; e.style.height=e.scrollHeight+'px'; };

        window.send = async () => {
            const el = document.getElementById('msg-input');
            const val = el.value.trim(); if(!val) return;
            el.value=''; el.style.height='auto';
            if(document.getElementById('home-page').classList.contains('active')) nav('chat');
            add('user', val); msgs.push({role:'user', content:val});
            const ai = add('ai', ''); const body = ai.querySelector('.body-text');
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:msgs, chat_id:currentId}) });
                const reader = res.body.getReader(); const decoder = new TextDecoder(); let full ="";
                while(true) {
                    const {done, value} = await reader.read(); if(done) break;
                    const lines = decoder.decode(value).split('\n');
                    for(const l of lines) {
                        if(l.startsWith('data: ')) {
                            const d = l.slice(6); if(d==='[DONE]') continue;
                            const p = JSON.parse(d);
                            if(p.content){ full+=p.content; body.innerHTML = marked.parse(full); body.querySelectorAll('pre code').forEach(c=>hljs.highlightElement(c)); scroll(); }
                            if(p.error) throw new Error(p.error);
                        }
                    }
                }
                msgs.push({role:'assistant', content:full}); loadSessions();
            } catch(e){ body.innerHTML = `<span style="color:var(--secondary)">Error: ${e.message}</span>`; }
        };

        function add(role, val) {
            const box = document.getElementById('feed-box');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            d.innerHTML = `<div class="role">${role.toUpperCase()}</div><div class="bubble"><div class="body-text">${marked.parse(val)}</div></div>`;
            box.appendChild(d); scroll(); return d;
        }

        async function loadSessions() {
            const r = await fetch('/get_history');
            const d = await r.json();
            document.getElementById('stat-chats').innerText = d.length;
            const box = document.getElementById('history-box'); box.innerHTML = '';
            d.forEach(s => {
                const i = document.createElement('div');
                i.className = `history-item ${s.id===currentId?'active':''}`;
                i.innerHTML = `<span>${s.title}</span><span class="delete-btn" onclick="event.stopPropagation(); doDelete('${s.id}')">🗑️</span>`;
                i.onclick = () => loadSess(s.id); box.appendChild(i);
            });
        }

        async function loadSess(id) {
            nav('chat'); const r = await fetch(`/get_chat/${id}`); const d = await r.json();
            currentId = id; msgs = d.messages;
            const f = document.getElementById('feed-box'); f.innerHTML = '';
            msgs.forEach(m => add(m.role==='assistant'?'ai':'user', m.content));
        }

        window.doDelete = async (id) => {
            if(!confirm("Delete this conversation?")) return;
            try {
                const r = await fetch(`/delete_chat/${id}`, { method: 'DELETE' });
                const d = await r.json();
                if(d.status === 'success') {
                    if(currentId === id) { currentId = null; msgs = []; document.getElementById('feed-box').innerHTML = ''; }
                    loadSessions();
                } else alert(d.error);
            } catch(e) { alert("Failed to delete: " + e.message); }
        };

        function scroll() { const s = document.getElementById('scroll-box'); s.scrollTop = s.scrollHeight; }
        document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); send();} });
    </script>
</body>
</html>
